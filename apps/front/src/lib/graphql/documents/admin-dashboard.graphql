# ================= Organization Access Requests =================
query OrganizationAccessRequests(
  $filter: OrganizationAccessRequestFilterInput
  $pagination: OrganizationAccessRequestPaginationInput
) {
  organizationAccessRequests(filter: $filter, pagination: $pagination) {
    items {
      id
      goals
      status
      country
      createdAt
      updatedAt
      workEmail
      reviewedAt
      reviewedById
      rejectReason
      approvedUserId
      organizationType
      organizationName
      representativeJobRole
      representativeFullName
      expectedLicensedProfessionals
    }
    pageInfo {
      page
      limit
      totalPages
      totalItems
      hasNextPage
      hasPreviousPage
    }
  }
}

query OrganizationAccessRequestById($requestId: String!) {
  organizationAccessRequestById(requestId: $requestId) {
    id
    goals
    status
    country
    workEmail
    createdAt
    updatedAt
    reviewedAt
    reviewedById
    rejectReason
    approvedUserId
    organizationName
    organizationType
    representativeJobRole
    representativeFullName
    expectedLicensedProfessionals
  }
}

mutation ReviewOrganizationAccessRequest(
  $input: ReviewOrganizationAccessRequestInput!
) {
  reviewOrganizationAccessRequest(input: $input) {
    id
    goals
    status
    country
    workEmail
    createdAt
    updatedAt
    reviewedAt
    reviewedById
    rejectReason
    approvedUserId
    organizationName
    organizationType
    representativeJobRole
    representativeFullName
    expectedLicensedProfessionals
  }
}

# ================== Users ==================
# ========== Admin User Management ==============
query Users($filter: UserFilterInput, $pagination: UserPaginationInput) {
  users(filter: $filter, pagination: $pagination) {
    items {
      id
      bio
      role
      email
      phone
      status
      lastName
      fullName
      firstName
      avatarUrl
      createdAt
      updatedAt
      deletedAt
      lastLoginAt
      emailVerifiedAt
      phoneVerifiedAt
    }
    pageInfo {
      page
      limit
      totalItems
      totalPages
      hasNextPage
      hasPreviousPage
    }
  }
}

query UserById($userId: String!) {
  userById(userId: $userId) {
    id
    bio
    role
    email
    phone
    status
    lastName
    fullName
    firstName
    avatarUrl
    createdAt
    updatedAt
    deletedAt
    lastLoginAt
    emailVerifiedAt
    phoneVerifiedAt
    professionalProfile {
      id
      skills
      userId
      industry
      interests
      createdAt
      updatedAt
      profession
      currentRole
      workLocation
      experienceRange
    }
    providerProfile {
      id
      userId
      website
      logoUrl
      updatedAt
      createdAt
      isPremium
      contactEmail
      contactPhone
      organizationName
    }
    organizationProfile {
      id
      userId
      website
      logoUrl
      country
      industry
      timezone
      createdAt
      updatedAt
      memberLimit
      contactEmail
      contactPhone
      organizationName
    }
  }
}

mutation UpdateUser($input: UpdateUserInput!) {
  updateUser(input: $input) {
    id
    bio
    role
    email
    phone
    status
    fullName
    lastName
    avatarUrl
    firstName
    updatedAt
  }
}

mutation UpdateUserStatus($input: UpdateUserStatusInput!) {
  updateUserStatus(input: $input) {
    id
    role
    email
    status
    fullName
    updatedAt
  }
}

mutation DeleteUser($userId: String!) {
  deleteUser(userId: $userId) {
    id
    role
    email
    status
    fullName
    deletedAt
  }
}

mutation RestoreUser($userId: String!) {
  restoreUser(userId: $userId) {
    id
    role
    email
    status
    fullName
    deletedAt
  }
}
