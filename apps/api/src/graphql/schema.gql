type YouTubeVideo {
  channelId: String!
  createdAt: DateTime!
  description: String
  durationMinutes: Int
  id: ID!
  likes: Int!
  publishedAt: DateTime
  status: YouTubeVideoStatus!
  thumbnailUrl: String
  title: String!
  updatedAt: DateTime!
  videoUrl: String
  views: Int!
}

enum YouTubeVideoStatus {
  ARCHIVED
  DRAFT
  PUBLISHED
}